@if (session(); as s) {
  <div class="relative">
    <button
      type="button"
      (click)="toggleOpen()"
      class="flex items-center gap-2 rounded-lg border px-3 py-1.5 text-sm hover:bg-slate-50"
    >
      <span class="max-w-[120px] truncate text-slate-700">{{ s.user.displayName }}</span>
      <svg class="h-4 w-4 text-slate-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path d="M5.25 7.5l4.75 5 4.75-5H5.25z" />
      </svg>
    </button>

    @if (open()) {
      <div class="absolute right-0 z-10 mt-1 w-48 rounded-lg border bg-white shadow-lg">
        <div class="border-b px-4 py-2">
          <p class="text-xs text-slate-500">{{ s.user.email }}</p>
        </div>
        <button
          type="button"
          (click)="handleLogout()"
          class="w-full px-4 py-2 text-left text-sm text-slate-700 hover:bg-slate-50"
        >
          {{ 'auth.logout' | translate }}
        </button>
      </div>
    }
  </div>
}
