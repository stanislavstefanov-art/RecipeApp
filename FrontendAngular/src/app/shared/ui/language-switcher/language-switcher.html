<div class="flex gap-1">
  <button
    type="button"
    [class]="activeLang() === 'bg'
      ? 'rounded-full px-3 py-1 text-xs font-medium bg-green-700 text-white transition-colors'
      : 'rounded-full px-3 py-1 text-xs font-medium text-slate-500 hover:text-slate-900 transition-colors'"
    (click)="setLang('bg')"
  >БГ</button>
  <button
    type="button"
    [class]="activeLang() === 'en'
      ? 'rounded-full px-3 py-1 text-xs font-medium bg-green-700 text-white transition-colors'
      : 'rounded-full px-3 py-1 text-xs font-medium text-slate-500 hover:text-slate-900 transition-colors'"
    (click)="setLang('en')"
  >EN</button>
</div>
