<span
  [class]="size() === 'sm' ? 'inline-flex gap-0.5 text-sm' : 'inline-flex gap-0.5 text-xl'"
  [attr.aria-label]="value() != null ? value() + ' out of 5 stars' : 'Not rated'"
>
  @for (n of stars; track n) {
    @if (readonly()) {
      <span [class]="isFilled(n) ? 'text-amber-400' : 'text-slate-300'">★</span>
    } @else {
      <button
        type="button"
        [attr.aria-label]="'Rate ' + n + (n === 1 ? ' star' : ' stars')"
        (click)="onSelect(n)"
        [class]="isFilled(n) ? 'text-amber-400 leading-none' : 'text-slate-300 hover:text-amber-300 leading-none transition-colors'"
      >★</button>
    }
  }
</span>
