<div class="flex items-center gap-1.5" role="group" aria-label="Theme">
  @for (t of themes; track t.id) {
    <button
      type="button"
      [title]="t.label"
      (click)="themeService.set(t.id)"
      class="h-5 w-5 rounded-full border-2 transition-transform hover:scale-110"
      [style.background-color]="t.color"
      [class.border-white]="themeService.current() === t.id"
      [class.border-transparent]="themeService.current() !== t.id"
      [attr.aria-pressed]="themeService.current() === t.id"
    ></button>
  }
</div>
