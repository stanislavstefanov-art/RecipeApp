<section class="mx-auto max-w-xl p-6">
  <header class="mb-6">
    <h1 class="text-2xl font-semibold">Create recipe</h1>
  </header>

  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="space-y-4 rounded-xl border border-gray-200 bg-white p-6"
    novalidate
  >
    @if (submitError(); as error) {
      <div
        class="rounded border border-red-300 bg-red-50 p-3 text-sm text-red-900"
        role="alert"
      >
        {{ error }}
      </div>
    }

    <div>
      <label for="name" class="block text-sm font-medium">Name</label>
      <input
        id="name"
        type="text"
        formControlName="name"
        class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-black focus:outline-none"
      />
      @if (form.controls.name.touched && form.controls.name.errors; as errors) {
        @if (errors['required']) {
          <p class="mt-1 text-sm text-red-600">Name is required.</p>
        } @else if (errors['maxlength']) {
          <p class="mt-1 text-sm text-red-600">Name must be 200 characters or fewer.</p>
        }
      }
    </div>

    <button
      type="submit"
      [disabled]="isSubmitting()"
      class="rounded-lg bg-black px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-gray-800 disabled:cursor-not-allowed disabled:bg-gray-400"
    >
      {{ isSubmitting() ? 'Creating…' : 'Create' }}
    </button>
  </form>
</section>
