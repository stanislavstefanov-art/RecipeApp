<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-3">
  <div class="flex flex-wrap gap-3">
    <div class="flex flex-col gap-1">
      <label for="cookedOn" class="text-sm font-medium text-gray-700">{{ 'cookingLog.cookedOn' | translate }}</label>
      <input
        id="cookedOn"
        type="date"
        formControlName="cookedOn"
        [max]="todayIso"
        class="rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"
      />
    </div>
    <div class="flex flex-col gap-1">
      <label for="servings" class="text-sm font-medium text-gray-700">{{ 'cookingLog.servings' | translate }}</label>
      <input
        id="servings"
        type="number"
        formControlName="servings"
        min="1"
        max="100"
        class="w-20 rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"
      />
    </div>
  </div>
  <textarea
    formControlName="notes"
    [placeholder]="'cookingLog.notesPlaceholder' | translate"
    maxlength="500"
    rows="2"
    class="w-full rounded-lg border border-gray-200 p-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300"
  ></textarea>
  @if (persons().length > 0) {
    <div>
      <p class="mb-1.5 text-sm font-medium text-gray-700">{{ 'cookingLog.preparedBy' | translate }}</p>
      <div class="flex flex-wrap gap-3">
        @for (person of persons(); track person.id) {
          <label class="flex cursor-pointer items-center gap-1.5">
            <input
              type="checkbox"
              [checked]="isPersonSelected(person.id)"
              (change)="togglePerson(person.id, $any($event.target).checked)"
              class="h-4 w-4 rounded border-gray-300"
            />
            <span class="text-sm text-gray-700">{{ person.name }}</span>
          </label>
        }
      </div>
    </div>
  }
  <button
    type="submit"
    [disabled]="form.invalid"
    class="rounded bg-green-700 px-4 py-1.5 text-sm font-medium text-white transition-colors hover:bg-green-800 disabled:cursor-not-allowed disabled:opacity-50"
  >
    {{ 'cookingLog.logCooking' | translate }}
  </button>
</form>
