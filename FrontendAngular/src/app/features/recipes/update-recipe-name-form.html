<form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-3" novalidate>
  @if (submitError(); as error) {
    <div
      class="rounded border border-red-300 bg-red-50 p-3 text-sm text-red-900"
      role="alert"
    >
      {{ error }}
    </div>
  }

  <div>
    <label for="recipe-name" class="block text-sm font-medium">{{ 'recipes.recipeName' | translate }}</label>
    <input
      id="recipe-name"
      type="text"
      formControlName="name"
      class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-black focus:outline-none"
    />
    @if (form.controls.name.touched && form.controls.name.errors; as errors) {
      @if (errors['required']) {
        <p class="mt-1 text-sm text-red-600">{{ 'validation.required' | translate }}</p>
      } @else if (errors['maxlength']) {
        <p class="mt-1 text-sm text-red-600">{{ 'validation.maxLength' | translate:{max: 200} }}</p>
      }
    }
  </div>

  <button
    type="submit"
    [disabled]="isSubmitting()"
    class="rounded-lg bg-green-700 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-green-800 disabled:cursor-not-allowed disabled:bg-gray-400"
  >
    {{ isSubmitting() ? ('recipes.saving' | translate) : ('recipes.saveName' | translate) }}
  </button>
</form>
