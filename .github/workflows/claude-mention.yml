name: claude-mention

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: claude-mention-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  respond:
    if: >-
      contains(github.event.comment.body, '@claude') &&
      github.event.comment.user.type != 'Bot' &&
      vars.CLAUDE_BOT_ENABLED != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: React with eyes
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const comment_id = context.payload.comment.id;
            const isReviewComment = context.eventName === 'pull_request_review_comment';
            await (isReviewComment
              ? github.rest.reactions.createForPullRequestReviewComment
              : github.rest.reactions.createForIssueComment)({
                  owner, repo, comment_id, content: 'eyes'
              });

      - name: Claude responds
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-haiku-4-5-20251001
          max_turns: '8'
          allowed_tools: 'Bash,Read,Grep,Glob'
          prompt: |
            You were summoned by a comment on:
            ${{ github.event.issue.html_url || github.event.pull_request.html_url }}

            Strip "@claude" from the start of the request and answer it by
            reading the repository (Read/Grep/Glob). Keep your answer under
            30 lines. Reference file:line for any code you cite.

            If the user asks you to do something destructive (edit files,
            push commits, open PRs), politely decline — you are read-only.

            Request:
            ---
            ${{ github.event.comment.body }}
            ---

            End your response with a single line:
              BOT_REPLY: <your full reply here, escaped as a single line>

      - name: Post reply comment
        if: always() && steps.claude.outputs.result != ''
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.claude.outputs.result || '' }}`;
            const m = output.match(/BOT_REPLY:\s*(.+)$/m);
            const body = m ? m[1].trim() : output.trim().split('\n').slice(-10).join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue?.number
              ?? context.payload.pull_request?.number;
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
