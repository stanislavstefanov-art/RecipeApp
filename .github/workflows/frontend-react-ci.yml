name: frontend-react-ci

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-react-ci.yml'
  push:
    branches: [main]
    paths:
      - 'Frontend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: Frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - run: npm ci

      - name: Build with production API URL
        env:
          VITE_API_BASE_URL: https://${{ vars.API_HOSTNAME }}
        run: npm run build

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SWA deployment token from Key Vault
        id: token
        working-directory: ${{ github.workspace }}
        run: |
          token=$(az keyvault secret show \
            --vault-name "${{ vars.KEY_VAULT_NAME }}" \
            --name React-Deployment-Token \
            --query value \
            --output tsv)
          echo "::add-mask::$token"
          echo "value=$token" >> "$GITHUB_OUTPUT"

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.token.outputs.value }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: Frontend/dist
          skip_app_build: true
          production_branch: main

  close-preview:
    name: close-preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SWA deployment token from Key Vault
        id: token
        run: |
          token=$(az keyvault secret show \
            --vault-name "${{ vars.KEY_VAULT_NAME }}" \
            --name React-Deployment-Token \
            --query value \
            --output tsv)
          echo "::add-mask::$token"
          echo "value=$token" >> "$GITHUB_OUTPUT"

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.token.outputs.value }}
          action: close
