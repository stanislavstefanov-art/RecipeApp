name: frontend-angular-ci

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'FrontendAngular/**'
      - '.github/workflows/frontend-angular-ci.yml'
  push:
    branches: [main]
    paths:
      - 'FrontendAngular/**'
      - '.github/workflows/frontend-angular-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FrontendAngular
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: FrontendAngular/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run build

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: build
    if: github.event.action != 'closed'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: FrontendAngular
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: FrontendAngular/package-lock.json

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('FrontendAngular/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - run: npm run e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            FrontendAngular/playwright-report/
            FrontendAngular/test-results/
          retention-days: 7

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.action != 'closed') ||
      github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: FrontendAngular
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: FrontendAngular/package-lock.json

      - run: npm ci

      - name: Bake API URL into prod environment
        run: |
          sed -i "s|apiBaseUrl: ''|apiBaseUrl: 'https://${{ vars.API_HOSTNAME }}'|g" \
            src/environments/environment.prod.ts

      - run: npm run build

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SWA deployment token from Key Vault
        id: token
        working-directory: ${{ github.workspace }}
        run: |
          token=$(az keyvault secret show \
            --vault-name "${{ vars.KEY_VAULT_NAME }}" \
            --name Angular-Deployment-Token \
            --query value \
            --output tsv)
          echo "::add-mask::$token"
          echo "value=$token" >> "$GITHUB_OUTPUT"

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.token.outputs.value }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: FrontendAngular/dist/frontend-angular/browser
          skip_app_build: true
          production_branch: main

  close-preview:
    name: close-preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch SWA deployment token from Key Vault
        id: token
        run: |
          token=$(az keyvault secret show \
            --vault-name "${{ vars.KEY_VAULT_NAME }}" \
            --name Angular-Deployment-Token \
            --query value \
            --output tsv)
          echo "::add-mask::$token"
          echo "value=$token" >> "$GITHUB_OUTPUT"

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.token.outputs.value }}
          action: close
