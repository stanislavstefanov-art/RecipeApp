name: backend-ci

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'Backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'Backend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore Backend/Recipes.sln

      - run: dotnet build Backend/Recipes.sln --no-restore --configuration Release

      - run: dotnet test Backend/Recipes.sln --no-build --configuration Release --filter "Category!=Docker"

  integration:
    name: integration
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore Backend/Recipes.sln

      - run: dotnet build Backend/Recipes.sln --no-restore --configuration Release

      - run: dotnet test Backend/Recipes.sln --no-build --configuration Release --filter "Category=Docker"

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [unit, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API
        run: dotnet publish Backend/src/Recipes.Api -c Release -o ./publish-api

      - name: Publish MCP server
        run: dotnet publish Backend/src/Recipes.McpServer -c Release -o ./publish-mcp

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_PREFIX }}-api
          package: ./publish-api

      - name: Deploy MCP server
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_PREFIX }}-mcp
          package: ./publish-mcp

      - name: Smoke check API
        run: |
          for i in {1..10}; do
            if curl --fail --silent --show-error "https://${{ vars.API_HOSTNAME }}/health"; then
              echo "API health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 6s..."
            sleep 6
          done
          echo "::error::API health check did not pass within 60s"
          exit 1

      - name: Smoke check MCP server
        run: |
          for i in {1..10}; do
            if curl --fail --silent --show-error "https://${{ vars.AZURE_PREFIX }}-mcp.azurewebsites.net/health"; then
              echo "MCP health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 6s..."
            sleep 6
          done
          echo "::error::MCP health check did not pass within 60s"
          exit 1
